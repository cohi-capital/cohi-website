name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          REDDIT_PIXEL_ID: ${{ secrets.REDDIT_PIXEL_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          echo "// Configuration file - Generated at build time from GitHub Secrets" > config.js
          echo "const GOOGLE_APPS_SCRIPT_URL = '$(echo -n "$GOOGLE_APPS_SCRIPT_URL" | tr -d '\n\r')';" >> config.js
          echo "const REDDIT_PIXEL_ID = '$(echo -n "$REDDIT_PIXEL_ID" | tr -d '\n\r')';" >> config.js
          echo "const POSTHOG_API_KEY = '$(echo -n "$POSTHOG_API_KEY" | tr -d '\n\r')';" >> config.js
          echo "const POSTHOG_HOST = '$(echo -n "$POSTHOG_HOST" | tr -d '\n\r')';" >> config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
